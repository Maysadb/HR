<section class="card">
    <h2><i class="icon">📝</i> نموذج تعيين موظف جديد (HR)</h2>
    <form id="employeeForm">
        <!-- المجموعه الأولى: البيانات الشخصية -->
        <div class="form-group-title">البيانات الشخصية</div>
        <div class="form-row">
            <input type="text" id="fullNameAr" placeholder="الاسم الكامل (عربي)" required>
            <input type="text" id="fullNameEn" placeholder="Full Name (English)" required>
        </div>
        <div class="form-row">
            <input type="text" id="nationalId" placeholder="رقم الهوية / الإقامة (National/Iqama ID)" required>
            <input type="tel" id="phoneNumber" placeholder="رقم الهاتف (Telephone Number)" required>
        </div>

        <!-- المجموعة الثانية: البيانات الوظيفية -->
        <div class="form-group-title">البيانات الوظيفية</div>
        <div class="form-row">
            <input type="text" id="employeeId" placeholder="الرقم الوظيفي (Employee ID)" required>
            <input type="number" id="joiningYear" placeholder="سنة الالتحاق (Joining Year)" min="2000" max="2099" required>
        </div>
        <div class="form-row">
            <select id="department" required>
                <option value="">اختر القسم (Department)</option>
                <option value="IT">IT</option>
                <option value="Academic">Academic</option>
                <option value="Admin">Admin</option>
            </select>
            <input type="text" id="section" placeholder="الفرع / القسم الفرعي (Section)">
        </div>
        <div class="form-row">
            <input type="text" id="jobPosition" placeholder="المسمى الوظيفي (Job Position)" required>
            <input type="text" id="empType" placeholder="نوع التوظيف (Type - Full time/Part time)">
        </div>

        <!-- المجموعة الثالثة: بيانات التواصل والـ IT -->
        <div class="form-group-title">بيانات التواصل والـ IT</div>
        <div class="form-row">
            <input type="email" id="schoolEmail" placeholder="الإيميل المدرسي (School Email)">
            <input type="text" id="phoneExtension" placeholder="التحويلة الداخلية (Phone Extension)">
        </div>
        
        <textarea id="comments" placeholder="ملاحظات إضافية (Comments)" rows="3"></textarea>

        <button type="submit" id="addBtn" class="btn-submit">إرسال الطلب لقسم IT</button>
    </form>
</section>
